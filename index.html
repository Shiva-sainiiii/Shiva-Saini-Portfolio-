<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Crazy Portfolio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 3D Background -->
    <canvas id="bg-canvas"></canvas>
    
    <!-- Navbar -->
    <nav id="navbar">
        <div class="nav-container">
            <a href="#home" class="nav-link active">Home</a>
            <a href="#projects" class="nav-link">Projects</a>
            <a href="#skills" class="nav-link">Skills</a>
            <a href="#contact" class="nav-link">Contact</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="section">
        <div class="hero-content">
            <h1 class="hero-title">I'm <span class="gradient-text">Your Name</span></h1>
            <p class="hero-subtitle">Full Stack Developer | UI/UX Designer</p>
            <div class="hero-buttons">
                <a href="#projects" class="btn-primary">View Projects</a>
                <a href="resume.pdf" class="btn-secondary" download>Download Resume</a>
            </div>
        </div>
    </section>

    <!-- Projects -->
    <section id="projects" class="section">
        <h2 class="section-title">Projects</h2>
        <div class="projects-grid">
            <div class="project-card">
                <h3>E-Commerce App</h3>
                <p>React + Node.js + MongoDB</p>
            </div>
            <!-- Add more projects -->
        </div>
    </section>

    <!-- Skills -->
    <section id="skills" class="section">
        <h2 class="section-title">Skills</h2>
        <div class="skills-grid">
            <span class="skill-tag">React</span>
            <span class="skill-tag">Node.js</span>
            <!-- Add more skills -->
        </div>
    </section>

    <!-- Contact + Feedback -->
    <section id="contact" class="section">
        <h2 class="section-title">Get In Touch</h2>
        
        <!-- Feedback Form -->
        <form id="feedback-form" class="feedback-form">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <textarea id="message" placeholder="Your Feedback" required></textarea>
            <button type="submit">Send Feedback 🚀</button>
        </form>

        <!-- Social Links -->
        <div class="social-links">
            <a href="#">GitHub</a>
            <a href="#">LinkedIn</a>
            <a href="#">Twitter</a>
        </div>
    </section>

    <!-- AI Chat -->
    <div id="ai-chat" class="chat-container">
        <div id="chat-messages"></div>
        <div class="chat-input-container">
            <input type="text" id="chat-input" placeholder="Ask me anything...">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script src="firebase.js"></script>
    <script src="openrouter.js"></script>
    <script src="script.js"></script>
</body>
</html>
